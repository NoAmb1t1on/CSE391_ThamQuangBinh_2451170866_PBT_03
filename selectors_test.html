<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm chứng Selector bằng Màu nền</title>
    <style>
        h1 { background-color: yellow !important; }
        .price { background-color: lightgreen !important; }
        #app header { background-color: #f0f0f0;}
        nav a:first-child { background-color: orange !important; }
        .product.featured h2 { background-color: lightblue !important; }
        a[href="/"] { background-color: purple !important; color: white !important; }
    </style>
</head>
<body>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>

</body>
</html>
